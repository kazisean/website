<script>
(function () {
  var counter = document.getElementById('view-count');
  if (!counter) return;
  var path = window.location.pathname.replace(/^\//, '');
  var url = 'https://kazi.goatcounter.com/counter/' + path + '.json';
  fetch(url)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var count = parseInt(data.count, 10) || 0;
      if (count > 0) {
        counter.textContent = count + ' views';
      } else {
        counter.textContent = '0 views';
      }
    })
    .catch(function () {});
})();
</script>
